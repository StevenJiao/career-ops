<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.8px;
    line-height: 1.37;
    color: #000;
    background: #fff;
    padding: 0.17in 0.22in;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
  }

  a { color: #000; text-decoration: none; white-space: nowrap; }

  .header { text-align: center; margin-bottom: 10px; }
  .header h1 {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 3px;
  }

  .contact-row {
    font-size: 12.5px;
    color: #000;
  }
  .contact-row a { color: #000; text-decoration: none; }
  .contact-row .separator { color: #000; }

  .section { margin-bottom: 9px; }
  .section-title {
    font-size: 12.5px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid #000;
    padding-bottom: 1px;
    margin-bottom: 5px;
  }

  /* === WORK EXPERIENCE === */
  .job { margin-bottom: 7px; }
  .job:last-child { margin-bottom: 0; }
  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .job-company { font-size: 12.5px; }
  .job-period { font-size: 12.5px; font-weight: bold; white-space: nowrap; }
  .job-role {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    font-size: 12.5px;
    font-weight: bold;
    margin-bottom: 2px;
  }
  .job-title { font-weight: bold; }
  .job-location { font-size: 12.5px; font-weight: 400; white-space: nowrap; }

  .job ul { padding-left: 0; margin-top: 2px; list-style: none; }
  .job li { font-size: 12px; line-height: 1.37; margin-bottom: 2px; padding-left: 14px; text-indent: -14px; }
  .job li::before { content: "\25AA\00A0"; }
  .job li strong { font-weight: bold; }

  /* === EDUCATION === */
  .edu-item { margin-bottom: 6px; }
  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .edu-title { font-weight: bold; font-size: 12.5px; }
  .edu-year { font-size: 12.5px; font-weight: bold; white-space: nowrap; }
  .edu-desc { font-size: 12.5px; margin-top: 1px; }
  .edu-org { font-weight: 400; }

  /* === SKILLS === */
  .skills-grid { display: flex; flex-wrap: wrap; gap: 4px 14px; }
  .skill-item { font-size: 12px; }
  .skill-category { font-weight: bold; font-size: 12px; }

  /* === PRINT === */
  @media print {
    .page { padding: 0; }
  }

  /* === PAGE BREAK CONTROL === */
  .avoid-break,
  .job,
  .edu-item,
  .skill-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <!-- EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

  <!-- SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SKILLS}}</div>
    {{SKILLS}}
  </div>

</div>
</body>
</html>
